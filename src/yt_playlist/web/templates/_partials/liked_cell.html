{# Clickable Liked-Music toggle for a song row: outline heart when not liked, filled when liked.
   Posts to /track/like (flips it in your main account's Liked Music) and swaps this cell back.
   Heart icon: Feather/Lucide "heart" (MIT), inlined. Needs: video_id, liked. #}
<td class="liked-col">
  <button type="button" class="like-btn{{ ' on' if liked }}"
          aria-pressed="{{ 'true' if liked else 'false' }}"
          title="{{ 'Remove from your Liked Music' if liked else 'Add to your Liked Music' }}"
          hx-post="/track/like" hx-vals='{"video_id": "{{ video_id }}", "on": "{{ '' if liked else '1' }}"}'
          hx-target="closest .liked-col" hx-swap="outerHTML">
    <svg viewBox="0 0 24 24" fill="{{ 'currentColor' if liked else 'none' }}" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </button>
</td>
