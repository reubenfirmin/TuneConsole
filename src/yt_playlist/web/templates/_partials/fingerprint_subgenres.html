{% for row in rows %}
<div class="fp-row fp-subrow">
  <span class="fp-name fp-subname" title="{{ row.name }}">{{ row.name }}</span>
  <input type="range" class="fp-slider" min="0" max="2" step="0.1" value="{{ row.effective }}"
         name="weight" hx-post="/home/steer" hx-vals='{"axis":"{{ row.axis }}"}'
         hx-target="#home-feed" hx-swap="outerHTML" hx-trigger="change"
         hx-on::before-request="sessionStorage.setItem('steered','1')"
         aria-label="favor or mute {{ row.name }}">
</div>
{% else %}
<span class="fp-hint section-note">No subgenres found for {{ family }}.</span>
{% endfor %}
