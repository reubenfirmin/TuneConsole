<section class="take-action" aria-label="Take action">
  <h2 class="section">Take action</h2>
  {% if actions %}
  <div class="card">
    {% for a in actions %}
    <div class="ta-item ta-{{ a.severity }}">
      <div class="ta-text">
        <span class="ta-title">{{ a.title }}</span>
        <span class="ta-detail">{{ a.detail }}</span>
      </div>
      {% if a.cta_href %}
      <a class="btn-ghost btn-sm" href="{{ a.cta_href }}">{{ a.cta_label }}</a>
      {% endif %}
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="section-note">All clear — nothing needs your attention.</p>
  {% endif %}
</section>
