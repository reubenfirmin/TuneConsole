{% if for_you %}
<div class="for-you-grid">
  {% for f in for_you %}
  <div class="fy-card card">
    <a class="fy-cover" href="https://music.youtube.com/watch?v={{ f.video_id }}"
       target="_blank" rel="noopener" title="Play on YouTube Music">
      {% if f.thumbnail %}<img src="{{ f.thumbnail }}" alt="" referrerpolicy="no-referrer" onerror="this.remove()">{% endif %}
      <span class="fy-play">▶</span>
    </a>
    <div class="fy-meta">
      <span class="fy-title">{{ f.title }}</span>
      <span class="fy-artist">{{ f.artist }}</span>
      <span class="fy-stats">
        <span class="tag teal">{{ f.plays }} plays</span>
        <span class="tag">last {{ f.days_since }}d ago</span>
      </span>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="section-note">Nothing to resurface yet — sync a few times and your forgotten gems will show up here.</p>
{% endif %}
