{# Rebuild control: while the worker is busy, show a spinner and self-poll every 2s; when it goes
   idle, revert to the button and confirm. Reached from the button (POST) and the poll (GET). #}
<span id="rebuild-ctl"{% if busy %} hx-get="/taste/rebuild-status" hx-trigger="load delay:2s" hx-swap="outerHTML"{% endif %}>
  {% if busy %}
  <button disabled><span class="spinner"></span> Rebuilding…</button>
  {% else %}
  <button hx-post="/taste/rebuild" hx-target="#rebuild-ctl" hx-swap="outerHTML">Rebuild model</button>
  <span class="tag teal">✓ Rebuilt — open Home to see updates</span>
  {% endif %}
</span>
