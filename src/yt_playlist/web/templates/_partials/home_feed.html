<div id="home-feed" class="home-feed" data-stance="{{ stance }}">
  {% include "_partials/taste_fingerprint.html" %}
  <div id="steer-toast" class="steer-toast" x-data="{show:false}" x-show="show" x-cloak x-transition
       x-init="$nextTick(() => { if (sessionStorage.getItem('steered')) { sessionStorage.removeItem('steered'); show=true; setTimeout(()=>show=false, 3500); } })">
    Re-ranked. <a href="/taste">Fine-tune your taste model →</a>
  </div>
  <div class="gen-lanes">
    {% for p in generated %}{% include "_partials/generated_playlist.html" %}{% endfor %}
    <div hx-get="/home/fresh" hx-trigger="load" hx-swap="outerHTML"></div>
    {% if comfort %}{% with p = comfort %}{% include "_partials/generated_playlist.html" %}{% endwith %}{% endif %}
  </div>
</div>
