<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="cd-body" cx="44%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#2a2470"/>
      <stop offset="58%" stop-color="#171340"/>
      <stop offset="100%" stop-color="#0b0920"/>
    </radialGradient>
    <linearGradient id="cd-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a596ff"/>
      <stop offset="32%" stop-color="#4fd6e0"/>
      <stop offset="64%" stop-color="#ff6b8b"/>
      <stop offset="100%" stop-color="#7c6cff"/>
    </linearGradient>
    <linearGradient id="cd-glint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- disc -->
  <circle cx="16" cy="16" r="14.2" fill="url(#cd-body)"/>
  <circle cx="16" cy="16" r="14.2" fill="none" stroke="url(#cd-sheen)" stroke-width="2.2"/>
  <!-- iridescent inner ring (the reflection sweep) -->
  <circle cx="16" cy="16" r="9.4" fill="none" stroke="url(#cd-sheen)" stroke-width="2.6" stroke-opacity="0.72"/>
  <!-- bright glint crescent (top-left reflection) -->
  <path d="M7.2 10 A11.6 11.6 0 0 1 18.5 5.2" fill="none" stroke="url(#cd-glint)" stroke-width="2.3" stroke-linecap="round"/>
  <!-- center hub -->
  <circle cx="16" cy="16" r="3.5" fill="#0b0920" stroke="#4fd6e0" stroke-width="1.1"/>
  <circle cx="16" cy="16" r="1.2" fill="#0b0920" stroke="#a596ff" stroke-width="0.8"/>
  <!-- neon sparkles -->
  <path transform="translate(27 5) scale(0.85)" fill="#ffffff"
        d="M0,-3 C0.4,-1 1,-0.4 3,0 C1,0.4 0.4,1 0,3 C-0.4,1 -1,0.4 -3,0 C-1,-0.4 -0.4,-1 0,-3 Z"/>
  <path transform="translate(5 24) scale(0.55)" fill="#4fd6e0"
        d="M0,-3 C0.4,-1 1,-0.4 3,0 C1,0.4 0.4,1 0,3 C-0.4,1 -1,0.4 -3,0 C-1,-0.4 -0.4,-1 0,-3 Z"/>
  <path transform="translate(27 26) scale(0.5)" fill="#ff8fb0"
        d="M0,-3 C0.4,-1 1,-0.4 3,0 C1,0.4 0.4,1 0,3 C-0.4,1 -1,0.4 -3,0 C-1,-0.4 -0.4,-1 0,-3 Z"/>
</svg>
