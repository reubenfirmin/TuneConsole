# Runs the full test suite on every push and pull request, so code changes that break tests
# (or leave them stale) can't land silently.
#
#   - unit: the default pytest run (the Playwright suite is deselected via pyproject addopts)
#   - browser: the live-browser suite (pytest -m browser) against real Chromium
name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Run the unit / route suite
        run: uv run pytest

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium
      - name: Run the live-browser suite
        run: uv run pytest -m browser
